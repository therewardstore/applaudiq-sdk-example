name: aiq_flutter_example
description: "Applaud IQ — Flutter embed example (manual + auto login + SSO)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Published on pub.dev. (For local SDK development, override with a path: dependency.)
  applaudiq_embed: ^1.1.0

  # For the auto-login test mint (calls your backend / the portal).
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Generates the Android mipmaps + iOS AppIcon set from the brand logo.
  # Regenerate after changing assets/app_icon.png:  dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png

# App launcher icon = the Applaud IQ brand logo (app icon only).
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/app_icon.png"
