<!doctype html>
<!-- ApplaudIQ Web SDK — plain HTML example (no framework, no build, one file). -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ApplaudIQ Web SDK — Plain HTML example</title>

    <!--
      1) Load the SDK once. The portal serves it at <portal>/embed.js (same origin as baseUrl).
      👉 REPLACE the host with your portal origin — shown in Admin → Clients → your org → Embed SDK tab.
         (Production is https://recognize.applaudiq.com/embed.js)
    -->
    <script src="https://recognize.applaudiq.com/embed.js"></script>

    <!-- Minimal styling so the embed fills the screen. Delete or replace with your own. -->
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid #e5e7eb;
      }
      h1 {
        font-size: 15px;
        margin: 0;
      }
      #status {
        font-size: 12px;
        padding: 3px 8px;
        border-radius: 999px;
        background: #f1f5f9;
        color: #475569;
      }
      #status.ready {
        background: #dcfce7;
        color: #166534;
      }
      #status.pending {
        background: #fef9c3;
        color: #854d0e;
      }
      #status.error {
        background: #fee2e2;
        color: #991b1b;
      }
      /* The SDK renders inline into this element — give it room to fill the page. */
      #applaudiq-recognition {
        flex: 1;
        min-height: 0;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Recognition</h1>
      <span id="status">loading…</span>
    </header>

    <!-- 2) The SDK renders the recognition portal inline, inside this element. -->
    <div id="applaudiq-recognition"></div>

    <!-- 3) Open the embed. Plain script — no modules, no build. -->
    <script>
      // 👉 REPLACE these two values. PUBLISHABLE_KEY is browser-safe (pk_live_/pk_test_)
      //    from HR portal → Settings → Embed SDK Keys. BASE_URL is your portal origin
      //    (must match the host in the <script src> above).
      var PUBLISHABLE_KEY = 'pk_test_xxxxxxxxxxxxxxxxxxxxxxxx';
      var BASE_URL = 'https://recognize.applaudiq.com';

      function setStatus(text, kind) {
        var el = document.getElementById('status');
        el.textContent = text;
        el.className = kind || '';
      }

      // ---- MANUAL login (default) -------------------------------------------------
      // The employee signs in (email / SSO) inside the embed. No server, no secret —
      // just the publishable key. This is all most apps need to get started.
      if (!window.ApplaudIQ) {
        setStatus('SDK not loaded — check the <script> src', 'error');
      } else {
        window.ApplaudIQ.init({ key: PUBLISHABLE_KEY, baseUrl: BASE_URL }).open({
          mode: 'manual',
          render: 'inline',
          container: '#applaudiq-recognition',
          onReady: function () {
            setStatus('signed in', 'ready');
          },
          onAuthPending: function () {
            setStatus('waiting for HR approval', 'pending');
          },
          onError: function (e) {
            setStatus(e.message, 'error');
          },
        });
      }

      // ---- AUTO login (optional) --------------------------------------------------
      // Sign the employee in silently with a one-time token your SERVER mints (it holds
      // the aiq_embed_ secret — never put that secret in this page). Hand the SDK a
      // getToken fetcher — that's all the client does. If the mint fails (e.g. the
      // employee isn't set up), the embedded portal shows the error itself; you write no
      // error UI. Replace the MANUAL block above with this once you have a mint endpoint:
      //
      //   window.ApplaudIQ.init({ key: PUBLISHABLE_KEY, baseUrl: BASE_URL }).open({
      //     mode: 'auto',
      //     getToken: function () {                                   // your backend
      //       return fetch('/api/mint', { method: 'POST' })
      //         .then(function (res) {
      //           if (!res.ok) throw new Error('mint failed (' + res.status + ')');
      //           return res.json();
      //         })
      //         .then(function (data) { return data.embedToken; });
      //     },
      //     render: 'inline',
      //     container: '#applaudiq-recognition',
      //     onReady: function () { setStatus('signed in', 'ready'); },
      //   });
      //
      // This page is a single static file, so /api/mint must be a backend mint endpoint
      // YOU host — it holds the secret and returns only the embedToken. The canonical
      // backend route ships in the nextjs example (app/api/mint/route.ts).
    </script>
  </body>
</html>
